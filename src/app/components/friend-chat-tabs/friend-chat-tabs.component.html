<div class="floating-chat-system">
  <!-- Active Chat Tabs (displayed side-by-side) -->
  <div class="chat-tabs-container">
    <div *ngFor="let tab of activeTabs; let i = index" class="chat-tab" [class.minimized]="tab.minimized">
      
      <!-- Tab Header -->
      <div class="tab-header" (click)="toggleMinimize(tab.friendId)">
        <div class="header-user-info">
          <div class="avatar-wrap">
            <img [src]="tab.user.avatarUrl ? apiUrl+ tab.user.avatarUrl : 'https://www.redditstatic.com/avatars/avatar_default_02_A5A4A4.png'" class="user-avatar" />
            <span class="status-indicator online"></span>
          </div>
          <span class="user-name">{{ getDisplayName(tab.user.firstName, tab.user.lastName, tab.user.username) }}</span>
        </div>
        <div class="header-actions" (click)="$event.stopPropagation()">
          <button class="btn-action text-danger" (click)="clearChat(tab.friendId)" title="Xóa lịch sử trò chuyện cả 2 bên">
            <i class="far fa-trash-alt"></i>
          </button>
          <button class="btn-action" (click)="toggleMinimize(tab.friendId)" title="Thu nhỏ">
            <i class="fas" [class.fa-minus]="!tab.minimized" [class.fa-chevron-up]="tab.minimized"></i>
          </button>
          <button class="btn-action close" (click)="closeChat(tab.friendId)" title="Đóng">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <!-- Tab Content Area (Hidden if minimized) -->
      <ng-container *ngIf="!tab.minimized">
        <!-- Message list -->
        <div class="tab-messages" #scrollContainer>
          <div class="messages-inner">
            <div *ngFor="let msg of tab.messages" class="tab-msg-row" [class.outgoing]="msg.sender === currentUserId" [class.incoming]="msg.sender !== currentUserId">
              <div class="msg-bubble" 
                   [class.recalled]="msg.recalled" 
                   (contextmenu)="onMessageContextMenu($event, msg, tab)"
                   [title]="msg.recalled ? 'Tin nhắn đã thu hồi' : (msg.timestamp | date:'dd/MM/yyyy HH:mm')">
                <!-- Media content (if any) -->
                <div *ngIf="msg.mediaUrl && !msg.recalled" class="tab-message-media">
                  <img *ngIf="msg.mediaType === 'IMAGE'" [src]="apiUrl + msg.mediaUrl" class="tab-media-img" alt="Hình ảnh đính kèm" (click)="openImage(apiUrl + msg.mediaUrl)" />
                  <video *ngIf="msg.mediaType === 'VIDEO'" [src]="apiUrl + msg.mediaUrl" controls class="tab-media-video" preload="metadata"></video>
                </div>
                <!-- Text content -->
                <span *ngIf="msg.recalled" class="recalled-text">
                  <i class="fas fa-undo-alt me-1"></i> Tin nhắn đã bị thu hồi
                </span>
                <span *ngIf="!msg.recalled && msg.content">{{ msg.content }}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- File Preview (when attachment is pending upload) -->
        <div *ngIf="tab.selectedFile" class="tab-attachment-preview">
          <div class="tab-preview-card">
            <img *ngIf="tab.previewType === 'IMAGE'" [src]="tab.previewUrl" class="tab-preview-thumb" />
            <video *ngIf="tab.previewType === 'VIDEO'" [src]="tab.previewUrl" class="tab-preview-thumb" muted></video>
            <button class="btn-clear-preview" (click)="clearAttachment(tab)">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>

        <!-- Composer Footer -->
        <div class="tab-footer">
          <input type="file" #fileInput (change)="onFileSelected($event, tab)" accept="image/*,video/*" style="display: none;" />
          
          <button type="button" class="btn-attach" (click)="fileInput.click()" [disabled]="tab.isUploading" title="Đính kèm ảnh/video">
            <i class="far fa-image"></i>
          </button>
          
          <input 
            type="text" 
            [(ngModel)]="tab.input" 
            (keyup.enter)="sendMessage(tab)"
            placeholder="Nhập tin nhắn..." 
            class="tab-input"
            [disabled]="tab.isUploading"
          />
          <button class="btn-send" (click)="sendMessage(tab)" [disabled]="(!tab.input.trim() && !tab.selectedFile) || tab.isUploading">
            <i *ngIf="!tab.isUploading" class="fas fa-paper-plane"></i>
            <i *ngIf="tab.isUploading" class="fas fa-circle-notch fa-spin"></i>
          </button>
        </div>
      </ng-container>
    </div>
  </div>

  <!-- Friends List Floating Launcher -->
  <div class="friend-list-wrapper">
    <!-- Panel showing list of friends -->
    <div *ngIf="isFriendListOpen" class="friend-list-panel animate__animated animate__fadeInUp">
      <div class="panel-header">
        <span>Bạn bè ({{ friends.length }})</span>
        <button class="btn-close-panel" (click)="toggleFriendList()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="panel-body">
        <div *ngIf="friends.length === 0" class="empty-state">
          <i class="fas fa-user-friends fa-2x text-muted mb-2"></i>
          <p>Chưa có bạn bè nào.</p>
        </div>
        <div *ngFor="let friend of friends" class="friend-item" (click)="openChat(friend.id)">
          <div class="friend-avatar-wrap">
            <img [src]="friend.avatarUrl  ? apiUrl + friend.avatarUrl : 'https://www.redditstatic.com/avatars/avatar_default_02_A5A4A4.png'" class="friend-avatar" />
            <span class="status-indicator online"></span>
          </div>
          <div class="friend-details">
            <span class="friend-name">{{ getDisplayName(friend.firstName, friend.lastName, friend.username) }}</span>
            <span class="friend-status text-muted">Trực tuyến</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Toggle button -->
    <button class="btn-launcher" (click)="toggleFriendList()" [class.active]="isFriendListOpen" title="Trò chuyện với bạn bè">
      <i class="far fa-comment-dots fa-lg"></i>
      <span class="badge-dot" *ngIf="friends.length > 0"></span>
    </button>
  </div>

  <!-- Custom Context Menu for Recall -->
  <div *ngIf="contextMenu.visible" class="custom-context-menu" [style.left.px]="contextMenu.x" [style.top.px]="contextMenu.y">
    <button class="menu-item text-danger" (click)="recallSelectedMessage()">
      <i class="fas fa-undo me-2"></i> Thu hồi tin nhắn
    </button>
  </div>
</div>
