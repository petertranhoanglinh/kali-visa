<div class="containershop">
    <div class="card">
        <div class="card-body">
            <div class="row">
                <div class="form-section">
                    <h1 class="title">Tạo Tài Khoản T'L Wealth Management</h1>
                    <p class="subtitle">Bắt đầu quản lý tài sản thông minh và tự động ngay hôm nay</p>
  
                    <form [formGroup]="userForm">
                        <div class="form-group">
                            <i class="fas fa-user form-icon"></i>
                            <input type="text" class="form-control" formControlName="username" placeholder="Họ và Tên">
                        </div>
  
                        <div class="form-group">
                            <i class="fas fa-envelope form-icon"></i>
                            <input type="email" class="form-control" formControlName="email" placeholder="Địa chỉ Email">
                        </div>
  
                        <div class="form-group">
                            <i class="fas fa-lock form-icon"></i>
                            <input type="password" class="form-control" formControlName="password" placeholder="Mật khẩu">
                        </div>
  
                        <div class="form-group">
                            <i class="fas fa-key form-icon"></i>
                            <input type="password" class="form-control" formControlName="rePassword" placeholder="Xác nhận Mật khẩu">
                        </div>
  
                        <div class="terms">
                            <input type="checkbox" formControlName="isTermsAccepted">
                            <label>Tôi đồng ý với <a href="#">Điều khoản Dịch vụ</a> và <a href="#">Chính sách Bảo mật</a></label>
                        </div>
  
                        <button (click)="addUser()" class="btn-register" style="background: #4f46e5;">Tạo Tài Khoản & Chọn Gói</button>
                    </form>
                </div>
  
                <div class="brand-section" style="background: linear-gradient(135deg, #4f46e5, #7c3aed);">
                    <h1 style="font-size: 2.5rem; color: white; margin-bottom: 1rem;">💎 T'L WEALTH</h1>
                    <h2 style="color: white; font-weight: 300;">Trợ lý Quản lý Tài Sản Cá Nhân</h2>
                    <p class="brand-description" style="color: rgba(255,255,255,0.8);">
                        The ultimate Wealth Management platform for wealth building. Tự động hóa chiến lược đầu tư, cảnh báo mất cân đối danh mục và AI phân tích vĩ mô thông minh.
                    </p>
                </div>
            </div>
        </div>
    </div>
  </div>
