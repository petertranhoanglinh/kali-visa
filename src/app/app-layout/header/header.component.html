<header class="fintech-header">
    <div class="header-container">
        <div class="header-left">
            <h1 class="brand-logo" style="margin:0; font-size: 1.2rem; color: #4f46e5; display:flex; align-items:center; gap:8px;">
                <span style="font-size: 1.8rem;">💎</span> T'L WEALTH
            </h1>
        </div>
        
        <nav class="header-nav">
            <ul class="nav-menu">
                <li><a routerLink="/dashboard" routerLinkActive="active">Tổng Quan</a></li>
                <li><a routerLink="/assets" routerLinkActive="active">Danh Mục</a></li>
                <li><a routerLink="/news" routerLinkActive="active">Tin Tức AI</a></li>
                <li><a routerLink="/rules" routerLinkActive="active">Quy Tắc</a></li>
                <li><a routerLink="/notes" routerLinkActive="active">Ghi Chú</a></li>
                <li><a routerLink="/social" routerLinkActive="active">Cộng Đồng</a></li>
                <li><a routerLink="/analytics" routerLinkActive="active">Phân Tích AI <span style="font-size: 0.7em; background: #fbbf24; color: black; padding: 2px 6px; border-radius: 4px; margin-left:4px; vertical-align: top;">PRO</span></a></li>
                <li><a routerLink="/pricing" class="highlight-nav" routerLinkActive="active">Nâng Cấp Gói</a></li>
                <li *ngIf="isAdmin"><a routerLink="/admin-upgrade" class="admin-nav" routerLinkActive="active">Duyệt Nâng Cấp</a></li>
            </ul>
        </nav>

        <div class="header-right">
            <div class="user-action" *ngIf="isLogin">
                <button class="btn-logout" (click)="logOut()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="auth-buttons" *ngIf="!isLogin">
                <a routerLink="/login" class="btn-login-outline hidden-mobile">Đăng Nhập</a>
                <a routerLink="/register" class="btn-register-filled hidden-mobile">Tạo Tài Khoản</a>
            </div>
            
            <!-- Mobile Menu Toggle Button -->
            <button class="hamburger-btn" (click)="isMobileMenuOpen = !isMobileMenuOpen">
                <i class="fas" [class.fa-bars]="!isMobileMenuOpen" [class.fa-times]="isMobileMenuOpen"></i>
            </button>
        </div>
    </div>
    
    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-overlay" *ngIf="isMobileMenuOpen" (click)="isMobileMenuOpen = false"></div>
    <div class="mobile-menu-container" [class.open]="isMobileMenuOpen">
        <nav class="mobile-nav">
            <a routerLink="/dashboard" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-chart-pie"></i> Tổng Quan</a>
            <a routerLink="/assets" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-wallet"></i> Danh Mục</a>
            <a routerLink="/news" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-newspaper"></i> Tin Tức AI</a>
            <a routerLink="/rules" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-bolt"></i> Quy Tắc</a>
            <a routerLink="/notes" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-sticky-note"></i> Ghi Chú</a>
            <a routerLink="/social" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-globe-asia"></i> Cộng Đồng</a>
            <a routerLink="/pricing" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link highlight"><i class="fas fa-gem"></i> Nâng Cấp Gói</a>
            <a *ngIf="isAdmin" routerLink="/admin-upgrade" routerLinkActive="active" (click)="isMobileMenuOpen = false" class="mobile-link admin"><i class="fas fa-user-shield"></i> Duyệt Nâng Cấp</a>
            <hr class="mobile-divider" *ngIf="!isLogin">
            <a *ngIf="!isLogin" routerLink="/login" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-sign-in-alt"></i> Đăng Nhập</a>
            <a *ngIf="!isLogin" routerLink="/register" (click)="isMobileMenuOpen = false" class="mobile-link"><i class="fas fa-user-plus"></i> Đăng Ký</a>
        </nav>
    </div>
</header>
