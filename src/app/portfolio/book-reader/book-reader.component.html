<div class="reader-container" [ngClass]="['theme-' + theme, 'font-' + fontFamily]" [style.fontSize.px]="fontSize">
  
  <!-- Left Navigation Sidebar -->
  <aside class="sidebar-nav" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <a routerLink="/books" class="btn-back">
        <i class="fas fa-arrow-left"></i> Thư viện
      </a>
      <h3>Danh sách trang</h3>
    </div>
    <div class="sidebar-content">
      <div class="book-mini-meta" *ngIf="book">
        <h4>{{ book.title }}</h4>
        <p>{{ book.author }}</p>
      </div>
      <ul class="page-list">
        <li *ngFor="let idx of pageList" 
            [class.active]="idx === currentPageIdx" 
            (click)="jumpToPage(idx)">
          <i class="far fa-file-alt"></i> Trang {{ idx + 1 }}
        </li>
      </ul>
    </div>
  </aside>

  <!-- Main Content Reading Area -->
  <main class="reading-area" [class.sidebar-collapsed]="!sidebarOpen">
    <!-- Top toolbar -->
    <header class="reader-toolbar">
      <button class="toolbar-btn" (click)="toggleSidebar()" title="Đóng/Mở thanh điều hướng">
        <i class="fas" [ngClass]="sidebarOpen ? 'fa-indent' : 'fa-dedent'"></i>
      </button>
      
      <div class="toolbar-center" *ngIf="book">
        <span class="toolbar-book-title">{{ book.title }}</span>
        <span class="toolbar-page-indicator">Trang {{ currentPageIdx + 1 }} / {{ totalPages }}</span>
      </div>

      <div class="toolbar-right" style="display: flex; gap: 0.75rem; align-items: center;">
        <!-- Nút chuyển đổi E-reader / Bản gốc PDF -->
        <button class="toolbar-btn view-mode-btn" (click)="toggleViewMode()" [title]="viewMode === 'reader' ? 'Xem bản gốc PDF' : 'Chuyển sang Chế độ đọc'">
          <i class="fas" [ngClass]="viewMode === 'reader' ? 'fa-file-pdf' : 'fa-book-open'"></i>
          <span class="btn-text" style="font-size: 0.82rem; font-weight: 600; margin-left: 5px; white-space: nowrap;">
            {{ viewMode === 'reader' ? 'Bản gốc PDF' : 'Chế độ đọc' }}
          </span>
        </button>

        <!-- Nút cài đặt giao diện -->
        <button class="toolbar-btn" (click)="toggleSettings()" title="Cài đặt giao diện" *ngIf="viewMode === 'reader'">
          <i class="fas fa-cog"></i>
        </button>
      </div>
    </header>

    <!-- Reading Content Panel -->
    <div class="reading-panel" id="readingPanel" (scroll)="onScroll($event)" (wheel)="onWheel($event)" *ngIf="viewMode === 'reader'">
      <div class="page-paper shadow-paper">
        <div class="loading-spinner-wrap" *ngIf="loading">
          <div class="spinner"></div>
          <p>Đang tải trang...</p>
        </div>

        <div class="page-content-wrapper animate-fade" *ngIf="!loading && currentPage">
          <!-- Iterate over blocks sorted in logical layout order -->
          <div class="layout-block" *ngFor="let block of currentPage.blocks">
            
            <!-- 1. Title Block -->
            <h2 class="block-title-header" *ngIf="block.type === 'title'" [style.text-align]="block.align || 'center'" [innerHTML]="getSafeHtml(block.content || getBlockText(block))">
            </h2>

            <!-- 2. Standard Text Block -->
            <p class="block-text-paragraph" *ngIf="block.type === 'text'" [style.text-align]="block.align || 'justify'" [innerHTML]="getSafeHtml(block.content || getBlockText(block))">
            </p>

            <!-- 2.5. Math Formula Block -->
            <div class="block-math-wrapper animate-fade" *ngIf="block.type === 'math'" [innerHTML]="getMathHtml(block)">
            </div>

            <!-- 3. Table Block -->
            <div class="block-table-wrapper" *ngIf="block.type === 'table'">
              <!-- Option A: Render HTML Table -->
              <div class="table-container" *ngIf="block.content || getTableHtml(block)" [innerHTML]="getSafeHtml(block.content || getTableHtml(block))"></div>
              
              <!-- Option B: Fallback/Alternative Render Table Image if HTML is missing -->
              <div class="table-image" *ngIf="!(block.content || getTableHtml(block)) && (block.imagePath || getBlockImagePath(block))">
                <img [src]="block.imagePath || getBlockImagePath(block)" alt="Dữ liệu bảng">
              </div>
            </div>

            <!-- 4. Chart Block -->
            <div class="block-chart-wrapper" *ngIf="block.type === 'chart'">
              <!-- Render Chart Image -->
              <div class="chart-image" *ngIf="block.imagePath || getBlockImagePath(block)">
                <img [src]="block.imagePath || getBlockImagePath(block)" alt="Biểu đồ số liệu">
              </div>
              
              <!-- Render Chart Caption -->
              <div class="chart-caption" *ngIf="block.content || getChartCaption(block)" [innerHTML]="getSafeHtml(block.content || getChartCaption(block))">
              </div>
            </div>

            <!-- 5. General Image Block -->
            <div class="block-image-wrapper" *ngIf="block.type === 'image'">
              <div class="general-image" *ngIf="block.imagePath || getBlockImagePath(block)">
                <img [src]="block.imagePath || getBlockImagePath(block)" alt="Hình ảnh minh họa">
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Genuine PDF Viewer Container -->
    <div class="pdf-iframe-container animate-fade" *ngIf="viewMode === 'pdf' && safePdfUrl" style="flex-grow: 1; width: 100%; height: calc(100vh - 56px); overflow: hidden; background-color: #f0f2f5;">
      <iframe [src]="safePdfUrl" width="100%" height="100%" style="border: none;"></iframe>
    </div>

    <!-- Bottom Navigation Bar -->
    <footer class="reader-footer" *ngIf="viewMode === 'reader'">
      <button class="nav-btn" (click)="prevPage()" [disabled]="currentPageIdx === 0">
        <i class="fas fa-chevron-left"></i> Trang trước
      </button>
      <span class="footer-page-indicator">Trang {{ currentPageIdx + 1 }} / {{ totalPages }}</span>
      <button class="nav-btn" (click)="nextPage()" [disabled]="currentPageIdx === totalPages - 1">
        Trang sau <i class="fas fa-chevron-right"></i>
      </button>
    </footer>
  </main>

  <!-- Right Settings Sidebar -->
  <aside class="sidebar-settings" [class.open]="settingsOpen">
    <div class="settings-header">
      <h3>Cài đặt giao diện</h3>
      <button class="close-btn" (click)="toggleSettings()"><i class="fas fa-times"></i></button>
    </div>
    <div class="settings-content">
      <div class="setting-item">
        <label>Chủ đề</label>
        <div class="theme-options">
          <div class="theme-dot dot-light" [class.active]="theme === 'light'" (click)="changeTheme('light')" title="Sáng"></div>
          <div class="theme-dot dot-dark" [class.active]="theme === 'dark'" (click)="changeTheme('dark')" title="Tối"></div>
          <div class="theme-dot dot-sepia" [class.active]="theme === 'sepia'" (click)="changeTheme('sepia')" title="Sepia"></div>
        </div>
      </div>
      <div class="setting-item">
        <label>Cỡ chữ</label>
        <div class="btn-group">
          <button (click)="decreaseFontSize()" [disabled]="fontSize <= 14" title="Giảm cỡ chữ"><i class="fas fa-minus"></i></button>
          <button style="font-weight: bold; cursor: default;">{{ fontSize }}px</button>
          <button (click)="increaseFontSize()" [disabled]="fontSize >= 24" title="Tăng cỡ chữ"><i class="fas fa-plus"></i></button>
        </div>
      </div>
      <div class="setting-item">
        <label>Phông chữ</label>
        <div class="btn-group">
          <button [class.active]="fontFamily === 'inter'" (click)="changeFont('inter')">Inter</button>
          <button [class.active]="fontFamily === 'system'" (click)="changeFont('system')">Hệ thống</button>
          <button [class.active]="fontFamily === 'serif'" (click)="changeFont('serif')">Serif</button>
        </div>
      </div>
    </div>
  </aside>
</div>
