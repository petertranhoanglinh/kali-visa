<div class="news-detail-container animate__animated animate__fadeIn">

  <!-- SKELETON LOADING -->
  <div class="detail-layout" *ngIf="isLoading">
    <div class="detail-sidebar">
      <div class="skeleton skeleton-back-btn"></div>
      <div class="skeleton skeleton-sidebar-title" style="margin-top:2rem"></div>
      <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1rem">
        <div class="skeleton skeleton-tag"></div>
        <div class="skeleton skeleton-tag"></div>
        <div class="skeleton skeleton-tag"></div>
        <div class="skeleton skeleton-tag"></div>
      </div>
    </div>
    <div class="detail-main">
      <div class="skeleton skeleton-cat" style="margin-bottom:1rem"></div>
      <div class="skeleton skeleton-h1"></div>
      <div class="skeleton skeleton-h1" style="width:75%;margin-top:0.75rem"></div>
      <div class="skeleton skeleton-meta" style="margin:1.5rem 0"></div>
      <div class="skeleton skeleton-img" style="margin-bottom:2rem"></div>
      <div *ngFor="let i of [1,2,3,4,5]">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line" style="width:92%;margin-top:0.5rem"></div>
        <div class="skeleton skeleton-line" style="width:80%;margin-top:0.5rem;margin-bottom:1.5rem"></div>
      </div>
    </div>
  </div>

  <!-- NỘI DUNG BÀI VIẾT -->
  <div *ngIf="!isLoading && news" class="detail-layout">
    <!-- Sidebar trái -->
    <div class="detail-sidebar">
      <div class="sidebar-widget trending-widget" style="margin-top:2rem">
        <h4 class="widget-title-line">TRENDING TOPICS</h4>
        <div class="topic-list">
          <span class="topic-tag">#ChungKhoan</span>
          <span class="topic-tag">#GiaVang</span>
          <span class="topic-tag">#ViMo</span>
          <span class="topic-tag">#Crypto</span>
        </div>
      </div>
    </div>

    <!-- Nội dung chính -->
    <div class="detail-main">
      <div class="article-content">
        <div class="article-header">
          <span class="cat" *ngIf="news.category">{{ news.category }}</span>
          <h1>{{ news.title }}</h1>
          <div class="meta" *ngIf="news.createdAt">
            <i class="far fa-clock"></i> {{ news.createdAt | date:'HH:mm, dd/MM/yyyy' }}
          </div>
        </div>

        <div class="article-summary" *ngIf="isPremium">{{ news.summary }}</div>
        <div class="article-body" *ngIf="isPremium" [innerHTML]="news.content"></div>

        <div class="article-footer" *ngIf="isPremium">
          <a [href]="news.sourceUrl" target="_blank" class="source-link" *ngIf="news.sourceUrl">
            Xem bài viết gốc <i class="fas fa-external-link-alt"></i>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && !news" class="error-state">
    <i class="fas fa-exclamation-triangle"></i>
    <p>Không tìm thấy bài viết này.</p>
    <a routerLink="/news" class="btn-primary">Quay lại trang chủ</a>
  </div>

</div>
